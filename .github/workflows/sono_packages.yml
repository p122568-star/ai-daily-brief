name: Sono Hotels Package Scraper

on:
  schedule:
    # 한국시간 기준 09:00, 11:00, 13:00, 15:00, 17:00 (UTC 기준 0, 2, 4, 6, 8시)
    - cron: '0 0,2,4,6,8 * * *'
  workflow_dispatch: # 수동 실행 가능하도록 설정

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-packages:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests python-dotenv google-generativeai
        playwright install chromium

    - name: Run Sono Package Scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SONO_ID: ${{ secrets.SONO_ID }}
        SONO_PW: ${{ secrets.SONO_PW }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python sono_package_scraper.py
